<header>

      <button class="active" data-lang="fr">
        <img src="images/Francais.webp">
      </button>
      <button data-lang="es">
        <img src="images/espagnol.webp">
      </button>
      <button data-lang="en">
        <img src="images/anglais.webp">
      </button>
    </div>

    <!-- Social -->
    <div class="social">

      <a class="social-btn insta"
         href="https://instagram.com/winlabqc/"
         target="_blank">
        <svg viewBox="0 0 24 24">
          <path d="M7.5 2h9A5.5 5.5 0 0 1 22 7.5v9A5.5 5.5 0 0 1 16.5 22h-9A5.5 5.5 0 0 1 2 16.5v-9A5.5 5.5 0 0 1 7.5 2Z"/>
        </svg>
      </a>

      <a class="social-btn fb"
         href="https://www.facebook.com/share/18MWWSutzW/"
         target="_blank">
        <svg viewBox="0 0 24 24">
          <path d="M13.5 22v-8h2.7l.4-3h-3.1V9.1c0-.9.3-1.5 1.6-1.5h1.7V5c-.3 0-1.3-.1-2.5-.1-2.5 0-4.2 1.5-4.2 4.3V11H7.6v3h2.5v8h3.4Z"/>
        </svg>
      </a>

    </div>

  </div>
</header>

<section class="hero">
  <h2 id="headline" class="fade">
    Réparation de téléphones & consoles
  </h2>

  <p id="sub" class="fade">
    Winlab vend, achète et répare des cellulaires et consoles à Waterloo.
  </p>
</section>

</div>

<a class="fab"
   href="https://wa.me/14502097144"
   target="_blank">
   WhatsApp
</a>

<script>
const t = {
  fr:{
    headline:"Réparation de téléphones & consoles",
    sub:"Winlab vend, achète et répare des cellulaires et consoles à Waterloo."
  },
  es:{
    headline:"Reparación de celulares y consolas",
    sub:"Winlab vende, compra y repara celulares y consolas en Waterloo."
  },
  en:{
    headline:"Phone & Console Repair",
    sub:"Winlab buys, sells and repairs phones and consoles in Waterloo."
  }
};

function setLang(lang){

  const ids=["headline","sub"];

  ids.forEach(id=>{
    document.getElementById(id).classList.add("out");
  });

  setTimeout(()=>{
    document.getElementById("headline").textContent=t[lang].headline;
    document.getElementById("sub").textContent=t[lang].sub;

    document.querySelectorAll(".lang button")
      .forEach(b=>b.classList.toggle("active",b.dataset.lang===lang));

    ids.forEach(id=>{
      document.getElementById(id).classList.remove("out");
    });

  },180);
}

document.querySelectorAll(".lang button")
  .forEach(btn=>{
    btn.addEventListener("click",()=>setLang(btn.dataset.lang));
  });
</script>
